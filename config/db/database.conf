# ZeroDayMMO Database Configuration

database {
  # Database connection
  url = "jdbc:sqlite:data/zeroday.db"
  url = ${?ZERODAY_DB_URL}
  
  user = ""
  user = ${?ZERODAY_DB_USER}
  
  password = ""
  password = ${?ZERODAY_DB_PASSWORD}
  
  # Connection pool settings
  max-pool-size = 10
  connection-timeout = 30000
}