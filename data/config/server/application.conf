# ZeroDayMMO Server Configuration

server {
  # Network settings
  port = 8080
  port = ${?ZERODAY_PORT}
  
  max-connections = 2000
  max-connections = ${?ZERODAY_MAX_CONNECTIONS}
  
  max-connections-per-ip = 8
  max-connections-per-ip = ${?ZERODAY_MAX_CONNECTIONS_PER_IP}
  
  # Game settings
  max-players = 1000
  task-generation-interval = 30000
  network-node-count = 500
  
  # Player starting resources
  starting-cpu = 100
  starting-ram = 256
  starting-bandwidth = 50
  starting-credits = 0
  
  # Server identity
  name = "ZeroDayMMO"
  name = ${?ZERODAY_SERVER_NAME}
}